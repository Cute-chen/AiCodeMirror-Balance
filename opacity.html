<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面板主题</title>
    <style>
      :root {
        color-scheme: light;
        --theme-rgb: 37, 43, 49;
        --theme-strong-rgb: 24, 30, 37;
        --text-rgb: 17, 50, 74;
        --text-soft-rgb: 95, 129, 159;
        font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: rgb(var(--text-rgb));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      body {
        padding: 0;
      }

      .shell {
        width: 100%;
        height: 100%;
        padding: 14px;
      }

      .card {
        height: 100%;
        padding: 14px;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.56);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.78), transparent 34%),
          linear-gradient(180deg, rgba(235, 246, 255, 0.94), rgba(241, 249, 255, 0.9));
        backdrop-filter: blur(24px) saturate(150%);
        -webkit-backdrop-filter: blur(24px) saturate(150%);
        box-shadow: 0 18px 36px rgba(56, 103, 143, 0.18);
        overflow: hidden;
      }

      .head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .title {
        margin: 0;
        font-size: 16px;
        line-height: 1.2;
      }

      .close-button {
        appearance: none;
        border: 1px solid rgba(var(--theme-rgb), 0.3);
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.5);
        color: rgb(var(--theme-strong-rgb));
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
      }

      .section {
        display: grid;
        gap: 10px;
      }

      .section + .section {
        margin-top: 10px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .section-title {
        font-size: 13px;
        font-weight: 700;
      }

      .value-pill {
        min-width: 66px;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(var(--theme-rgb), 0.16);
        color: rgb(var(--theme-strong-rgb));
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
      }

      .range-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .number-wrap,
      .hex-wrap {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        min-height: 34px;
        border-radius: 12px;
        border: 1px solid rgba(var(--theme-rgb), 0.24);
        background: rgba(255, 255, 255, 0.58);
      }

      .number-input,
      .hex-input {
        border: 0;
        outline: 0;
        background: transparent;
        color: rgb(var(--text-rgb));
        font-size: 14px;
        font-weight: 600;
      }

      .number-input {
        width: 52px;
        text-align: right;
      }

      .hex-input {
        width: 88px;
        text-transform: uppercase;
      }

      .suffix,
      .prefix {
        color: rgb(var(--text-soft-rgb));
        font-size: 13px;
        font-weight: 600;
      }

      .range-input {
        width: 100%;
        accent-color: rgb(var(--theme-rgb));
      }

      .picker-wrap {
        display: grid;
        gap: 10px;
      }

      .picker-row {
        display: grid;
        grid-template-columns: 1fr 30px;
        gap: 10px;
      }

      .board-shell,
      .hue-shell {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.55);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .board-shell {
        height: 168px;
        background:
          linear-gradient(to top, #000, transparent),
          linear-gradient(to right, #fff, rgba(255, 255, 255, 0));
      }

      .hue-shell {
        height: 168px;
        background: linear-gradient(
          to top,
          #ff0000 0%,
          #ff00ff 16.6%,
          #0000ff 33.3%,
          #00ffff 50%,
          #00ff00 66.6%,
          #ffff00 83.3%,
          #ff0000 100%
        );
      }

      .board-overlay {
        position: absolute;
        inset: 0;
      }

      .board-cursor,
      .hue-cursor {
        position: absolute;
        pointer-events: none;
      }

      .board-cursor {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px rgba(17, 50, 74, 0.28);
        transform: translate(-50%, -50%);
      }

      .hue-cursor {
        left: -3px;
        width: calc(100% + 6px);
        height: 8px;
        border-radius: 999px;
        border: 2px solid #fff;
        box-shadow: 0 0 0 1px rgba(17, 50, 74, 0.2);
        transform: translateY(-50%);
      }

      .swatches {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .preview {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .preview-color {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.68);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        background: #252b31;
      }

      .preview-meta {
        display: grid;
        gap: 2px;
      }

      .preview-label {
        color: rgb(var(--text-soft-rgb));
        font-size: 12px;
      }

      .preview-value {
        font-size: 14px;
        font-weight: 700;
      }

      .ghost-button {
        appearance: none;
        border: 1px solid rgba(var(--theme-rgb), 0.26);
        border-radius: 999px;
        min-height: 34px;
        padding: 0 12px;
        background: rgba(255, 255, 255, 0.56);
        color: rgb(var(--theme-strong-rgb));
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card">
        <div class="head">
          <div>
            <h1 class="title">主题设置</h1>
          </div>
          <button class="close-button" id="close-button" type="button" title="关闭">×</button>
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-title">面板透明度</div>
            <div class="value-pill" id="value-pill">90%</div>
          </div>
          <div class="range-row">
            <input class="range-input" id="range-input" type="range" min="0" max="100" step="1" value="90" />
            <label class="number-wrap" for="number-input">
              <input class="number-input" id="number-input" type="number" min="0" max="100" step="1" value="90" />
              <span class="suffix">%</span>
            </label>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-title">面板高度</div>
            <div class="value-pill" id="height-value-pill">740px</div>
          </div>
          <div class="range-row">
            <input
              class="range-input"
              id="height-range-input"
              type="range"
              min="520"
              max="920"
              step="10"
              value="740"
            />
            <label class="number-wrap" for="height-number-input">
              <input
                class="number-input"
                id="height-number-input"
                type="number"
                min="520"
                max="920"
                step="10"
                value="740"
              />
              <span class="suffix">px</span>
            </label>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-title">主题色</div>
            <label class="hex-wrap" for="hex-input">
              <span class="prefix">HEX</span>
              <input class="hex-input" id="hex-input" type="text" value="#252B31" maxlength="7" spellcheck="false" />
            </label>
          </div>

          <div class="picker-wrap">
            <div class="picker-row">
              <div class="board-shell" id="board-shell">
                <div class="board-overlay" id="board-overlay"></div>
                <div class="board-cursor" id="board-cursor"></div>
              </div>
              <div class="hue-shell" id="hue-shell">
                <div class="hue-cursor" id="hue-cursor"></div>
              </div>
            </div>

            <div class="swatches">
              <div class="preview">
                <div class="preview-color" id="preview-color"></div>
                <div class="preview-meta">
                  <div class="preview-label">当前主题色</div>
                  <div class="preview-value" id="preview-value">#252B31</div>
                </div>
              </div>
              <button class="ghost-button" id="reset-button" type="button">恢复默认</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require('electron');

      const valuePill = document.getElementById('value-pill');
      const numberInput = document.getElementById('number-input');
      const rangeInput = document.getElementById('range-input');
      const heightValuePill = document.getElementById('height-value-pill');
      const heightNumberInput = document.getElementById('height-number-input');
      const heightRangeInput = document.getElementById('height-range-input');
      const hexInput = document.getElementById('hex-input');
      const closeButton = document.getElementById('close-button');
      const boardShell = document.getElementById('board-shell');
      const boardOverlay = document.getElementById('board-overlay');
      const boardCursor = document.getElementById('board-cursor');
      const hueShell = document.getElementById('hue-shell');
      const hueCursor = document.getElementById('hue-cursor');
      const previewColor = document.getElementById('preview-color');
      const previewValue = document.getElementById('preview-value');
      const resetButton = document.getElementById('reset-button');

      const pickerState = {
        opacityPercent: 90,
        defaultOpacityPercent: 90,
        panelHeight: 740,
        defaultPanelHeight: 740,
        minPanelHeight: 520,
        maxPanelHeight: 920,
        hue: 210,
        saturation: 0.24489795918367346,
        value: 0.19215686274509805,
        defaultThemeColorHex: '#252b31',
        syncing: false
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function normalizePercent(value) {
        const numeric = Math.round(Number(value));
        if (!Number.isFinite(numeric)) return pickerState.defaultOpacityPercent;
        return clamp(numeric, 0, 100);
      }

      function normalizePanelHeight(value) {
        const numeric = Math.round(Number(value));
        if (!Number.isFinite(numeric)) return pickerState.panelHeight;
        return clamp(Math.round(numeric / 10) * 10, pickerState.minPanelHeight, pickerState.maxPanelHeight);
      }

      function normalizeHex(value, fallback = '#252b31') {
        const matched = typeof value === 'string' ? value.trim().match(/^#?([0-9a-fA-F]{6})$/) : null;
        return matched ? `#${matched[1].toLowerCase()}` : fallback.toLowerCase();
      }

      function hsvToRgb(h, s, v) {
        const hue = ((h % 360) + 360) % 360;
        const c = v * s;
        const x = c * (1 - Math.abs(((hue / 60) % 2) - 1));
        const m = v - c;
        let r1 = 0;
        let g1 = 0;
        let b1 = 0;

        if (hue < 60) [r1, g1, b1] = [c, x, 0];
        else if (hue < 120) [r1, g1, b1] = [x, c, 0];
        else if (hue < 180) [r1, g1, b1] = [0, c, x];
        else if (hue < 240) [r1, g1, b1] = [0, x, c];
        else if (hue < 300) [r1, g1, b1] = [x, 0, c];
        else [r1, g1, b1] = [c, 0, x];

        return {
          r: Math.round((r1 + m) * 255),
          g: Math.round((g1 + m) * 255),
          b: Math.round((b1 + m) * 255)
        };
      }

      function rgbToHex(rgb) {
        const parts = [rgb.r, rgb.g, rgb.b].map((value) => value.toString(16).padStart(2, '0'));
        return `#${parts.join('')}`;
      }

      function hexToRgb(hex) {
        const normalized = normalizeHex(hex).slice(1);
        return {
          r: parseInt(normalized.slice(0, 2), 16),
          g: parseInt(normalized.slice(2, 4), 16),
          b: parseInt(normalized.slice(4, 6), 16)
        };
      }

      function rgbToHsv(rgb) {
        const r = rgb.r / 255;
        const g = rgb.g / 255;
        const b = rgb.b / 255;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const delta = max - min;
        let hue = 0;

        if (delta !== 0) {
          if (max === r) hue = 60 * (((g - b) / delta) % 6);
          else if (max === g) hue = 60 * (((b - r) / delta) + 2);
          else hue = 60 * (((r - g) / delta) + 4);
        }

        return {
          h: (hue + 360) % 360,
          s: max === 0 ? 0 : delta / max,
          v: max
        };
      }

      function applyThemePreview(hex) {
        const rgb = hexToRgb(hex);
        const strong = hsvToRgb(pickerState.hue, clamp(pickerState.saturation + 0.12, 0, 1), clamp(pickerState.value * 0.76, 0, 1));
        document.documentElement.style.setProperty('--theme-rgb', `${rgb.r}, ${rgb.g}, ${rgb.b}`);
        document.documentElement.style.setProperty('--theme-strong-rgb', `${strong.r}, ${strong.g}, ${strong.b}`);
      }

      function getCurrentHex() {
        return rgbToHex(hsvToRgb(pickerState.hue, pickerState.saturation, pickerState.value));
      }

      function renderPercent(percent) {
        pickerState.opacityPercent = normalizePercent(percent);
        valuePill.textContent = `${pickerState.opacityPercent}%`;
        if (document.activeElement !== numberInput) {
          numberInput.value = String(pickerState.opacityPercent);
        }
        if (document.activeElement !== rangeInput) {
          rangeInput.value = String(pickerState.opacityPercent);
        }
      }

      function renderPanelHeight(height) {
        pickerState.panelHeight = normalizePanelHeight(height);
        heightValuePill.textContent = `${pickerState.panelHeight}px`;
        if (document.activeElement !== heightNumberInput) {
          heightNumberInput.value = String(pickerState.panelHeight);
        }
        if (document.activeElement !== heightRangeInput) {
          heightRangeInput.value = String(pickerState.panelHeight);
        }
      }

      function renderTheme() {
        const hex = getCurrentHex().toUpperCase();
        const hueColor = rgbToHex(hsvToRgb(pickerState.hue, 1, 1));
        boardShell.style.background = [
          'linear-gradient(to top, #000, transparent)',
          'linear-gradient(to right, #fff, rgba(255, 255, 255, 0))',
          hueColor
        ].join(',');

        boardCursor.style.left = `${pickerState.saturation * 100}%`;
        boardCursor.style.top = `${(1 - pickerState.value) * 100}%`;
        hueCursor.style.top = `${(1 - pickerState.hue / 360) * 100}%`;
        previewColor.style.background = hex;
        previewValue.textContent = hex;
        if (document.activeElement !== hexInput) {
          hexInput.value = hex;
        }
        applyThemePreview(hex);
      }

      function emitPercent() {
        ipcRenderer.send('opacity:set-percent', pickerState.opacityPercent);
      }

      function emitPanelHeight() {
        ipcRenderer.send('panel:set-height', pickerState.panelHeight);
      }

      function emitTheme() {
        ipcRenderer.send('theme:set-color', getCurrentHex());
      }

      function applyHex(hex, emit = true) {
        const rgb = hexToRgb(hex);
        const hsv = rgbToHsv(rgb);
        pickerState.hue = hsv.h;
        pickerState.saturation = hsv.s;
        pickerState.value = hsv.v;
        renderTheme();
        if (emit) {
          emitTheme();
        }
      }

      function updateBoardFromPoint(clientX, clientY) {
        const rect = boardShell.getBoundingClientRect();
        const x = clamp((clientX - rect.left) / rect.width, 0, 1);
        const y = clamp((clientY - rect.top) / rect.height, 0, 1);
        pickerState.saturation = x;
        pickerState.value = 1 - y;
        renderTheme();
        emitTheme();
      }

      function updateHueFromPoint(clientY) {
        const rect = hueShell.getBoundingClientRect();
        const y = clamp((clientY - rect.top) / rect.height, 0, 1);
        pickerState.hue = (1 - y) * 360;
        renderTheme();
        emitTheme();
      }

      function attachPointerDrag(element, onMove) {
        element.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          const pointerId = event.pointerId;
          element.setPointerCapture(pointerId);
          onMove(event);

          const move = (nextEvent) => {
            if (nextEvent.pointerId === pointerId) {
              onMove(nextEvent);
            }
          };

          const up = (nextEvent) => {
            if (nextEvent.pointerId !== pointerId) return;
            element.releasePointerCapture(pointerId);
            element.removeEventListener('pointermove', move);
            element.removeEventListener('pointerup', up);
            element.removeEventListener('pointercancel', up);
          };

          element.addEventListener('pointermove', move);
          element.addEventListener('pointerup', up);
          element.addEventListener('pointercancel', up);
        });
      }

      rangeInput.addEventListener('input', () => {
        renderPercent(rangeInput.value);
        emitPercent();
      });

      numberInput.addEventListener('input', () => {
        if (numberInput.value === '') return;
        renderPercent(numberInput.value);
        emitPercent();
      });

      numberInput.addEventListener('blur', () => {
        renderPercent(numberInput.value);
      });

      heightRangeInput.addEventListener('input', () => {
        renderPanelHeight(heightRangeInput.value);
        emitPanelHeight();
      });

      heightNumberInput.addEventListener('input', () => {
        if (heightNumberInput.value === '') return;
        renderPanelHeight(heightNumberInput.value);
        emitPanelHeight();
      });

      heightNumberInput.addEventListener('blur', () => {
        renderPanelHeight(heightNumberInput.value);
      });

      hexInput.addEventListener('change', () => {
        applyHex(normalizeHex(hexInput.value, getCurrentHex()));
      });

      hexInput.addEventListener('blur', () => {
        applyHex(normalizeHex(hexInput.value, getCurrentHex()));
      });

      attachPointerDrag(boardOverlay, (event) => {
        updateBoardFromPoint(event.clientX, event.clientY);
      });

      attachPointerDrag(hueShell, (event) => {
        updateHueFromPoint(event.clientY);
      });

      resetButton.addEventListener('click', () => {
        renderPercent(pickerState.defaultOpacityPercent);
        emitPercent();
        renderPanelHeight(pickerState.defaultPanelHeight);
        emitPanelHeight();
        applyHex(pickerState.defaultThemeColorHex);
      });

      closeButton.addEventListener('click', async () => {
        await ipcRenderer.invoke('opacity:hide');
      });

      window.addEventListener('keydown', async (event) => {
        if (event.key === 'Escape') {
          await ipcRenderer.invoke('opacity:hide');
        }
      });

      ipcRenderer.on('opacity:state', (_event, state) => {
        pickerState.defaultOpacityPercent = Math.round(Number(state?.defaultPanelOpacityPercent)) || 90;
        pickerState.defaultThemeColorHex = normalizeHex(state?.defaultThemeColorHex || '#252b31');
        pickerState.defaultPanelHeight = Math.round(Number(state?.defaultPanelHeight)) || 740;
        pickerState.minPanelHeight = Math.round(Number(state?.minPanelHeight)) || 520;
        pickerState.maxPanelHeight = Math.round(Number(state?.maxPanelHeight)) || 920;
        heightRangeInput.min = String(pickerState.minPanelHeight);
        heightRangeInput.max = String(pickerState.maxPanelHeight);
        heightNumberInput.min = String(pickerState.minPanelHeight);
        heightNumberInput.max = String(pickerState.maxPanelHeight);
        renderPercent(state?.panelOpacityPercent);
        renderPanelHeight(state?.panelHeight);
        applyHex(
          normalizeHex(state?.themeColorHex || pickerState.defaultThemeColorHex, pickerState.defaultThemeColorHex),
          false
        );
      });

      ipcRenderer.invoke('opacity:get-state').then((state) => {
        pickerState.defaultOpacityPercent = Math.round(Number(state?.defaultPanelOpacityPercent)) || 90;
        pickerState.defaultThemeColorHex = normalizeHex(state?.defaultThemeColorHex || '#252b31');
        pickerState.defaultPanelHeight = Math.round(Number(state?.defaultPanelHeight)) || 740;
        pickerState.minPanelHeight = Math.round(Number(state?.minPanelHeight)) || 520;
        pickerState.maxPanelHeight = Math.round(Number(state?.maxPanelHeight)) || 920;
        heightRangeInput.min = String(pickerState.minPanelHeight);
        heightRangeInput.max = String(pickerState.maxPanelHeight);
        heightNumberInput.min = String(pickerState.minPanelHeight);
        heightNumberInput.max = String(pickerState.maxPanelHeight);
        renderPercent(state?.panelOpacityPercent);
        renderPanelHeight(state?.panelHeight);
        applyHex(
          normalizeHex(state?.themeColorHex || pickerState.defaultThemeColorHex, pickerState.defaultThemeColorHex),
          false
        );
      });
    </script>
  </body>
  </html>
